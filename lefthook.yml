# lefthook.yml
pre-commit:
  parallel: true
  jobs:
    - name: secrets
      run: gitleaks git --pre-commit --redact --staged --verbose
    - name: lint
      glob: "*.py"
      run: uv run ruff check --fix {staged_files}
      stage_fixed: true
    - name: format
      glob: "*.py"
      run: uv run ruff format {staged_files}
      stage_fixed: true
    - name: typecheck
      glob: "*.py"
      run: uv run pyrefly check
    - name: tests
      glob: "*.py"
      run: uv run pytest -q
